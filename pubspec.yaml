name: event_platform_v3
description: "Event Platform V3 White Label Multi-Tenant Sports Platform Foundation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0
  retrofit: ^4.4.1

  # Serialization Annotations
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.3
  firebase_analytics: ^11.2.0

  # Utilities
  equatable: ^2.0.5
  logger: ^2.4.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  webview_flutter: ^4.13.0
  url_launcher: ^6.3.1
  video_player: ^2.10.1
  share_plus: ^12.0.2
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

  # Code Generation
  build_runner: ^2.4.11
  retrofit_generator: ^8.2.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  injectable_generator: ^2.6.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
